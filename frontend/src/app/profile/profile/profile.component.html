<div class="profile-layout">
  <aside class="profile-layout__sidebar">
    <div class="profile-layout__sidebar-inner">
      @if (showMyProfileButton$ | async) {
        <a
          class="profile-layout__home-btn"
          [routerLink]="['/profile', (loggedUser$ | async)?.id]"
        >
          ŌåÉ My profile
        </a>
      }
      <aside class="profile-layout__sidebar" *ngIf="user$ | async as user">
        <app-user-card [user]="user" />
      </aside>
    </div>
  </aside>

  <main class="profile-layout__content">
    <app-post-feed />
  </main>
</div>
